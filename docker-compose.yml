services:
  scraper:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOG_LEVEL: INFO
      # Austerity knob: 1=lean(EPL+UCL), 2=default, 3=full
      ACTIVE_TIER: 3
      SEASON: 2025
      # Override intervals (seconds) if needed:
      # INTERVAL_FULL_SWEEP: 10800
      # INTERVAL_CLOSING_24H: 3600
      # INTERVAL_CLOSING_6H: 900
